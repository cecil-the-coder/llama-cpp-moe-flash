name: Build ik_llama.cpp Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.ik-llama-cpu'
      - '.github/workflows/build-ik-image.yml'
  pull_request:
    paths:
      - 'docker/Dockerfile.ik-llama-cpu'
      - '.github/workflows/build-ik-image.yml'
  workflow_dispatch:
    inputs:
      ik_llama_ref:
        description: 'ik_llama.cpp branch or commit to build'
        default: 'main'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ik-llama-cpu

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.sha.outputs.short }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ik-llama-cpu
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IK_LLAMA_REF=${{ inputs.ik_llama_ref || 'main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image reference
        run: |
          echo "## ik_llama.cpp Image built" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
